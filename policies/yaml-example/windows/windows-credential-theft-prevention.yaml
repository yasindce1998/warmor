name: windows-credential-theft-prevention
version: 1
description: "Prevent credential theft techniques on Windows (LSASS, SAM, DPAPI, credential stores)"

variables:
  credential_stores:
    - "C:\\Windows\\System32\\config\\SAM"
    - "C:\\Windows\\System32\\config\\SECURITY"
    - "C:\\Windows\\System32\\config\\SYSTEM"
    - "C:\\Windows\\NTDS\\ntds.dit"
  dpapi_paths:
    - "C:\\Users\\*\\AppData\\Roaming\\Microsoft\\Credentials"
    - "C:\\Users\\*\\AppData\\Local\\Microsoft\\Credentials"
    - "C:\\Users\\*\\AppData\\Roaming\\Microsoft\\Protect"
    - "C:\\Windows\\System32\\Microsoft\\Protect"
  credential_dumpers:
    - "mimikatz.exe"
    - "procdump.exe"
    - "procdump64.exe"
    - "dumpert.exe"
    - "nanodump.exe"
    - "pypykatz"
    - "secretsdump"
    - "lazagne.exe"
    - "safetykatz.exe"
  lsass_names:
    - "lsass.exe"
    - "lsass.dmp"
    - "lsass.zip"

rules:
  # Block known credential dumping tools
  - name: block-credential-dumpers
    event: process
    conditions:
      all:
        - comm: { any_of: $credential_dumpers }
    action: deny
    reason: "Known credential dumping tool blocked"

  # Block access to SAM/SECURITY/SYSTEM registry hives
  - name: block-sam-access
    event: file
    conditions:
      all:
        - path: { any_of: $credential_stores }
    action: deny
    reason: "Direct access to credential registry hive"

  # Block reads of DPAPI master keys
  - name: audit-dpapi-access
    event: file
    conditions:
      all:
        - path: { glob: "C:\\Users\\*\\AppData\\*\\Microsoft\\Protect\\**" }
    action: log
    reason: "DPAPI master key access (credential decryption attempt)"

  # Block LSASS memory dump attempts
  - name: block-lsass-dump
    event: file
    conditions:
      all:
        - path: { glob: "*lsass*" }
        - operation: { any_of: ["write", "create"] }
    action: deny
    reason: "LSASS memory dump creation blocked"

  # Block reg.exe save of credential hives
  - name: block-reg-save-hives
    event: process
    conditions:
      all:
        - comm: { eq: "reg.exe" }
        - args: { contains: "save" }
    action: deny
    reason: "Registry hive export (credential extraction via reg save)"

  # Block ntdsutil for Active Directory credential extraction
  - name: block-ntdsutil
    event: process
    conditions:
      all:
        - comm: { eq: "ntdsutil.exe" }
    action: deny
    reason: "ntdsutil execution (AD credential extraction)"

  # Block vaultcmd credential enumeration
  - name: audit-vaultcmd
    event: process
    conditions:
      all:
        - comm: { eq: "vaultcmd.exe" }
    action: log
    reason: "Credential vault enumeration via vaultcmd"

  # Block comsvcs.dll MiniDump (T1003.001 alternative)
  - name: block-comsvcs-minidump
    event: process
    conditions:
      all:
        - comm: { eq: "rundll32.exe" }
        - args: { contains: "comsvcs" }
    action: deny
    reason: "MiniDump via comsvcs.dll (LSASS dump technique)"

  # Block shadow copy access for offline credential theft
  - name: block-shadow-copy-cred
    event: file
    conditions:
      all:
        - path: { glob: "\\\\?\\GLOBALROOT\\Device\\HarddiskVolumeShadowCopy*\\Windows\\System32\\config\\*" }
    action: deny
    reason: "Credential file access via volume shadow copy"

  # Audit Windows Credential Manager file access
  - name: audit-credential-manager
    event: file
    conditions:
      all:
        - path: { glob: "C:\\Users\\*\\AppData\\*\\Microsoft\\Credentials\\*" }
        - operation: { eq: "read" }
    action: log
    reason: "Windows Credential Manager file read"

default_action: allow
