global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "warmor-agent"
    static_targets:
      - targets: ["host.docker.internal:9090"]
    metrics_path: /metrics

  - job_name: "warmor-server"
    static_targets:
      - targets: ["host.docker.internal:9091"]
    metrics_path: /metrics
