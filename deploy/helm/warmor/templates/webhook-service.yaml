{{- if .Values.webhook.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "warmor.fullname" . }}-webhook
  labels:
    {{- include "warmor.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.webhook.port }}
      targetPort: webhook
      protocol: TCP
      name: https
  selector:
    {{- include "warmor.selectorLabels" . | nindent 4 }}
{{- end }}
