apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "warmor.fullname" . }}
  labels:
    {{- include "warmor.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "warmor.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: {{ .Values.updateStrategy.type }}
    {{- if eq .Values.updateStrategy.type "RollingUpdate" }}
    rollingUpdate:
      maxUnavailable: {{ .Values.updateStrategy.maxUnavailable }}
    {{- end }}
  template:
    metadata:
      annotations:
        checksum/policy: {{ .Values.policy.yaml | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.daemon.metricsPort | quote }}
        prometheus.io/path: "/metrics"
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "warmor.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "warmor.serviceAccountName" . }}
      {{- if .Values.priorityClass.enabled }}
      priorityClassName: {{ include "warmor.priorityClassName" . }}
      {{- end }}
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      terminationGracePeriodSeconds: 30
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: validate-policy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/warmor-daemon"]
          args: ["--validate-policy", "/etc/warmor/policy.yaml"]
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 50m
              memory: 32Mi
          volumeMounts:
            - name: policy
              mountPath: /etc/warmor
              readOnly: true
      containers:
        - name: warmor
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-policy"
            - "/etc/warmor/policy.yaml"
            - "-metrics-port"
            - {{ .Values.daemon.metricsPort | quote }}
            - "-log-level"
            - {{ .Values.daemon.logLevel | quote }}
            - "-stats-interval"
            - {{ .Values.daemon.statsInterval | quote }}
            {{- if .Values.daemon.auditMode }}
            - "-audit"
            {{- end }}
            {{- if .Values.daemon.cgroupFilter }}
            - "-cgroup-filter"
            - {{ .Values.daemon.cgroupFilter | quote }}
            {{- end }}
          securityContext:
            privileged: false
            runAsNonRoot: false
            runAsUser: 0
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["SYS_ADMIN", "BPF", "PERFMON", "NET_ADMIN"]
          ports:
            - name: metrics
              containerPort: {{ .Values.daemon.metricsPort }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /health
              port: metrics
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: policy
              mountPath: /etc/warmor
              readOnly: true
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: host-sys
              mountPath: /host/sys
              readOnly: true
            - name: bpf
              mountPath: /sys/fs/bpf
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /run
            {{- if .Values.daemon.cgroupFilter }}
            - name: host-cgroup
              mountPath: /host/sys/fs/cgroup
              readOnly: true
            {{- end }}
      volumes:
        - name: policy
          configMap:
            name: {{ include "warmor.fullname" . }}-policy
        - name: host-proc
          hostPath:
            path: /proc
        - name: host-sys
          hostPath:
            path: /sys
        - name: bpf
          hostPath:
            path: /sys/fs/bpf
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
        - name: run
          emptyDir:
            sizeLimit: 16Mi
        {{- if .Values.daemon.cgroupFilter }}
        - name: host-cgroup
          hostPath:
            path: /sys/fs/cgroup
        {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
