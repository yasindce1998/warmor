image:
  repository: ghcr.io/yasindce1998/warmor
  tag: ""
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

daemon:
  logLevel: info
  statsInterval: 30s
  metricsPort: 9090
  auditMode: false
  cgroupFilter: ""

policy:
  yaml: |
    name: cluster-default
    version: 1
    description: "Default cluster security policy"
    variables:
      blocked_bins:
        - "/usr/bin/nc"
        - "/usr/bin/ncat"
        - "/usr/bin/socat"
    rules:
      - name: block-tmp-exec
        event: process
        conditions:
          all:
            - path: { glob: "/tmp/**" }
        action: deny
        reason: "Execution from temp directory"
      - name: block-network-tools
        event: process
        conditions:
          all:
            - uid: { not: 0 }
            - path: { any_of: $blocked_bins }
        action: deny
        reason: "Blocked network tool"
    default_action: allow

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

tolerations:
  - operator: Exists

nodeSelector: {}

affinity: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

priorityClass:
  enabled: true
  name: ""
  value: 2000000000

updateStrategy:
  type: RollingUpdate
  maxUnavailable: "10%"

networkPolicy:
  enabled: true
  extraEgress: []

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

serviceMonitor:
  enabled: false
  interval: 15s
  scrapeTimeout: 10s
  additionalLabels: {}
  metricRelabelings: []
  relabelings: []

grafana:
  dashboardEnabled: false

alerting:
  enabled: false
  additionalLabels: {}
  rules:
    highDenyRate:
      enabled: true
      threshold: 10
      for: 5m
      severity: warning
    daemonDown:
      enabled: true
      for: 2m
      severity: critical
    highErrorRate:
      enabled: true
      threshold: 1
      for: 5m
      severity: warning
    ebpfLoaderFailure:
      enabled: true
      for: 1m
      severity: critical

webhook:
  enabled: false
  port: 9443
  certManager:
    enabled: false
    issuerRef: {}
  caBundle: ""

ebpf:
  pinPrograms: true
  pinPath: /sys/fs/bpf/warmor

logging:
  format: json
  output: stdout
  siem:
    enabled: false
    endpoint: ""
    format: "cef"

policySync:
  enabled: false
  source: ""
  namespace: "warmor-system"
