name: cluster-default
version: 1
description: "Default warmor security policy for Kubernetes clusters"

variables:
  temp_dirs:
    - "/tmp/**"
    - "/var/tmp/**"
    - "/dev/shm/**"
  network_tools:
    - "/usr/bin/nc"
    - "/usr/bin/ncat"
    - "/usr/bin/socat"
    - "/usr/bin/nmap"
  sensitive_ports:
    - 22
    - 23
    - 3389
    - 4444
    - 5900

rules:
  - name: block-tmp-exec
    event: process
    conditions:
      all:
        - path: { glob: "/tmp/**" }
    action: deny
    reason: "Execution from temporary directory"

  - name: block-devshm-exec
    event: process
    conditions:
      all:
        - path: { glob: "/dev/shm/**" }
    action: deny
    reason: "Execution from /dev/shm"

  - name: block-network-tools
    event: process
    conditions:
      all:
        - uid: { not: 0 }
        - path: { any_of: $network_tools }
    action: deny
    reason: "Unauthorized use of network reconnaissance tool"

  - name: log-suspicious-outbound
    event: network
    conditions:
      all:
        - uid: { not: 0 }
        - remote_port: { any_of: $sensitive_ports }
    action: log
    reason: "Non-root process connecting to sensitive port"

  - name: block-etc-write
    event: file
    conditions:
      all:
        - uid: { not: 0 }
        - path: { glob: "/etc/**" }
        - operation: { any_of: ["write"] }
    action: deny
    reason: "Non-root attempting to write to /etc"

default_action: allow
