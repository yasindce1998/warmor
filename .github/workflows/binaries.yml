name: Release Binaries

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o warmor-daemon-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/warmor-daemon

      - name: Create checksum
        run: sha256sum warmor-daemon-${{ matrix.goos }}-${{ matrix.goarch }} > warmor-daemon-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            warmor-daemon-${{ matrix.goos }}-${{ matrix.goarch }}
            warmor-daemon-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
