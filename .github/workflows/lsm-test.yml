name: LSM-BPF Tests

on:
  push:
    branches: [main]
    paths:
      - "bpf/**"
      - "internal/ebpf/**"
      - "internal/enforcer/**"
      - "cmd/warmor-daemon/**"
      - ".github/workflows/lsm-test.yml"
  pull_request:
    branches: [main]
    paths:
      - "bpf/**"
      - "internal/ebpf/**"
      - "internal/enforcer/**"
      - "cmd/warmor-daemon/**"
      - ".github/workflows/lsm-test.yml"
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests (hash, serialization)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run hash and serialization tests
        run: go test -v -race -run "TestHash|TestPolicyKey" ./internal/ebpf/...

  bpf-compile:
    name: BPF Compilation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install BPF build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev linux-headers-$(uname -r) gcc-multilib

      - name: Compile LSM exec program
        run: |
          clang -g -O2 -target bpf -D__TARGET_ARCH_x86 \
            -I/usr/include/bpf -I./bpf \
            -I/usr/include/x86_64-linux-gnu \
            -c bpf/lsm_exec.bpf.c -o /tmp/lsm_exec.bpf.o

      - name: Compile LSM file program
        run: |
          clang -g -O2 -target bpf -D__TARGET_ARCH_x86 \
            -I/usr/include/bpf -I./bpf \
            -I/usr/include/x86_64-linux-gnu \
            -c bpf/lsm_file.bpf.c -o /tmp/lsm_file.bpf.o

      - name: Compile LSM connect program
        run: |
          clang -g -O2 -target bpf -D__TARGET_ARCH_x86 \
            -I/usr/include/bpf -I./bpf \
            -I/usr/include/x86_64-linux-gnu \
            -c bpf/lsm_connect.bpf.c -o /tmp/lsm_connect.bpf.o

      - name: Compile monitor programs
        run: make -C bpf all

      - name: Verify BPF object files
        run: |
          for obj in /tmp/lsm_exec.bpf.o /tmp/lsm_file.bpf.o /tmp/lsm_connect.bpf.o; do
            echo "=== $(basename $obj) ==="
            llvm-objdump -h "$obj" | head -20
            echo ""
          done

  lsm-integration:
    name: LSM Integration (vimto)
    runs-on: ubuntu-latest
    needs: [unit-tests, bpf-compile]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 clang llvm libbpf-dev gcc-multilib
          sudo chmod 0666 /dev/kvm
          CGO_ENABLED=0 go install lmb.io/vimto@latest

      - name: Generate BPF bindings (replaces stubs with real loaders)
        env:
          BPF_CFLAGS: "-I../../bpf -I/usr/include/bpf -I/usr/include/x86_64-linux-gnu -D__TARGET_ARCH_x86"
          GOPACKAGE: ebpf
        run: |
          cd internal/ebpf
          go run github.com/cilium/ebpf/cmd/bpf2go lsm_exec ../../bpf/lsm_exec.bpf.c -- $BPF_CFLAGS
          go run github.com/cilium/ebpf/cmd/bpf2go lsm_file ../../bpf/lsm_file.bpf.c -- $BPF_CFLAGS
          go run github.com/cilium/ebpf/cmd/bpf2go lsm_connect ../../bpf/lsm_connect.bpf.c -- $BPF_CFLAGS
          go run github.com/cilium/ebpf/cmd/bpf2go execve_monitor ../../bpf/execve_monitor.bpf.c -- $BPF_CFLAGS
          go run github.com/cilium/ebpf/cmd/bpf2go openat_monitor ../../bpf/openat_monitor.bpf.c -- $BPF_CFLAGS
          go run github.com/cilium/ebpf/cmd/bpf2go connect_monitor ../../bpf/connect_monitor.bpf.c -- $BPF_CFLAGS
          rm -f generated_stubs.go

      - name: Run LSM integration tests in VM
        run: |
          CGO_ENABLED=0 $(go env GOPATH)/bin/vimto -- \
            go test -v -count 1 -tags integration -timeout 120s ./internal/ebpf/

